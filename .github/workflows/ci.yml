name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    env:
      APP_MODE: simple
      OPENAI_API_KEY: dummy
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: dummy
      CLERK_SECRET_KEY: dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: https://example.com/sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: https://example.com/sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: https://example.com/after-sign-in
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: https://example.com/after-sign-up
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      UPLOADTHING_SECRET: dummy
      UPLOADTHING_APP_ID: dummy
      MUX_TOKEN_ID: dummy
      MUX_TOKEN_SECRET: dummy
      STRIPE_API_KEY: dummy
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_WEBHOOK_SECRET: dummy
      NEXT_PUBLIC_TEACHER_ID: dummy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  dependabot:
    name: Dependabot
    needs: [lint-build-test]
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'}}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.2.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
